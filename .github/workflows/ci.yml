name: CI

# Runs the exact publish gate (`pnpm test`, which prepublishOnly also runs) on a
# clean runner WITHOUT the claude CLI, on every PR and push to main. This catches
# the CREAM-xzhidmjt class of bug — a scenario that shells out to a host CLI
# absent on CI runners — at review time instead of at `npm publish` time.
#
# CLI-shelling scenarios are tagged @needs-cli and excluded from the default
# (publish-gating) cucumber profile, so the gate is CI-safe by construction; this
# job is the guard that keeps it that way.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    # Prove the gate across the Node versions the dev toolchain supports. The
    # floor is Node 22.13+ — pnpm@11.3.0 (pinned via packageManager) imports
    # node:sqlite, which doesn't exist before 22.13 — so 20 can't run the
    # toolchain at all; 22 is the floor, 24 the current line. A failure on either
    # leg surfaces a version-specific break here, on the PR, not at publish time.
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      # Make the "no claude CLI" assumption explicit. GitHub runners don't ship
      # `claude`; fail loudly if that ever changes, since it would mask exactly
      # the breakage this job exists to catch.
      - name: Assert the claude CLI is absent (publish-runner parity)
        run: |
          if command -v claude >/dev/null 2>&1; then
            echo "::error::claude CLI unexpectedly present — this job must mirror the publish runner (no claude)."
            exit 1
          fi
          echo "claude CLI absent — runner mirrors the publish environment."

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Same command prepublishOnly runs. A scenario that shells out to a missing
      # CLI without a graceful skip will fail HERE (on the PR), not at publish.
      - name: Run the publish gate
        run: pnpm test
